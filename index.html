<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fff5f9" />
    <title>NailDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
    <script>
      (function(){
        try{
          var k='naildesk.theme';
          var s=localStorage.getItem(k);
          var m=(s==='light'||s==='dark'||s==='system')?s:'system';
          var t=m==='system'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):m;
          var r=document.documentElement;
          r.classList.remove('light','dark');
          r.classList.add(t);
          r.style.colorScheme=t;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t==='dark'?'#1f1815':'#fff5f9');
        }catch(e){
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
